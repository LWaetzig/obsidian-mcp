include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - secret-detection
  - build
  - release
  - mirror
  - pages

variables:
  SECRET_DETECTION_ENABLED: "true"

default:
  image: node:20-alpine
  tags:
    - pi

# Built-in security templates
sast:
  stage: secret-detection
  tags:
    - pi

secret_detection:
  stage: secret-detection
  tags:
    - pi

# Reusable rule fragments
.rules:
  no_mr: &no-mr
    if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    when: never

  on_branches_and_main: &on-branches-and-main
    - *no-mr
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^(dev|feature|bugfix|hotfix|release)\/.*$/'

  on_main: &on-main
    - *no-mr
    - if: '$CI_COMMIT_BRANCH == "main"'

# Build
build:
  stage: build
  before_script:
    - npm ci
  script:
    - npm run build
  artifacts:
    paths: [dist]
    expire_in: 12 hours
  rules: *on-branches-and-main

# Release: bump version, create tag, create GitLab release
release:gitlab:
  stage: release
  before_script:
    - apk add --no-cache git curl jq
    - npm install -g commit-and-tag-version --quiet
    - git config --global user.email "${GITLAB_USER_EMAIL}"
    - git config --global user.name "${GITLAB_USER_NAME}"
    - git config --global --add safe.directory '*'
    - echo "GL TOKEN is set" && test -n "$GL_TOKEN" && echo "Yes" || echo "no"
    - git remote rm origin && git remote add origin https://oauth2:${GL_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}
    - git tag -l | xargs -r git tag -d
    - git reset --hard
    - git clean -fd
    - git fetch
    - git checkout $CI_COMMIT_REF_NAME
    - git reset --hard origin/$CI_COMMIT_REF_NAME
    - git pull --ff-only origin $CI_COMMIT_REF_NAME
  script:
    - commit-and-tag-version --no-verify $RELEASE_ARGS
        --commitUrlFormat "${CI_PROJECT_URL}/commit/{{hash}}"
        --compareUrlFormat "${CI_PROJECT_URL}/compare/{{previousTag}}...{{currentTag}}"
    - git push -o ci.skip origin $CI_COMMIT_REF_NAME
    - git push origin --tags
    - |
      TAG=$(git describe --tags --abbrev=0)
      NOTES=$(awk '/^## \[/{if(p)exit; p=1; next} p' CHANGELOG.md)
      curl --fail-with-body -s -X POST \
        -H "PRIVATE-TOKEN: ${GL_TOKEN}" \
        -H "Content-Type: application/json" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
        -d "{
          \"name\": \"${TAG}\",
          \"tag_name\": \"${TAG}\",
          \"description\": $(echo "$NOTES" | jq -Rs .)
        }"
  rules: *on-main

# Mirror to GitHub & matching release
# Required CI/CD variables:
#   GITHUB_TOKEN  – PAT with "repo" scope
#   GITHUB_REPO   – target in "owner/repo" format
mirror:github:
  stage: mirror
  image: alpine:latest
  needs: ["release:gitlab"]
  variables:
    GIT_STRATEGY: none
  before_script:
    - apk add --no-cache git
  script:
    - git clone --bare --tags "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}" repo
    - cd repo
    - git push --mirror "https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
  rules: *on-main

release:github:
  stage: mirror
  image: alpine:latest
  needs: ["mirror:github"]
  before_script:
    - apk add --no-cache curl jq git
    - git config --global --add safe.directory '*'
    - git remote set-url origin https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}
    - git fetch --tags
  script:
    - |
      TAG=$(git describe --tags --abbrev=0)
      NOTES=$(awk '/^## \[/{if(p)exit; p=1; next} p' CHANGELOG.md)
      curl --fail-with-body -s -X POST \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/${GITHUB_REPO}/releases" \
        -d "{
          \"tag_name\": \"${TAG}\",
          \"name\": \"${TAG}\",
          \"body\": $(echo "$NOTES" | jq -Rs .)
        }"
  rules: *on-main

# Docs (GitLab Pages)
pages:
  stage: pages
  before_script:
    - npm ci
  script:
    - npm run docs
  artifacts:
    paths: [public]
  rules: *on-main
